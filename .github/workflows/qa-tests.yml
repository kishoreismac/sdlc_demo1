name: QA Test Suite – SDLC Demo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 6 AM UTC (production smoke test)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Suite to run: all | unit | api | ui'
        required: false
        default: 'all'

env:
  APP_BASE_URL: https://ec-user-home-page.azurewebsites.net
  APP_API_URL:  https://ec-user-home-page.azurewebsites.net/api
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests (fast – no network, no browser)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (JUnit 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Unit Tests
        working-directory: qa-tests
        run: |
          mvn test \
            -Dtest="DateUtilsTest,WeatherServiceTest" \
            -Dsurefire.failIfNoSpecifiedTests=false \
            --no-transfer-progress

      - name: Upload Unit Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: qa-tests/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 2: API Tests (network required – hits production)
  # ─────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests (REST Assured)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run API Tests
        working-directory: qa-tests
        run: |
          mvn test \
            -Dtest="WeatherApiTest,CalendarAndDeploymentTest" \
            -Dapp.base.url=${{ env.APP_BASE_URL }} \
            -Dapp.api.url=${{ env.APP_API_URL }} \
            -Dsurefire.failIfNoSpecifiedTests=false \
            --no-transfer-progress

      - name: Upload API Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: qa-tests/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 3: UI Tests (Selenium + headless Chrome)
  # ─────────────────────────────────────────────────────────────
  ui-tests:
    name: UI Tests (Selenium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Run UI Tests
        working-directory: qa-tests
        run: |
          mvn test \
            -Dtest="HomePageUITest,CalendarUITest,WeatherUITest" \
            -Dapp.base.url=${{ env.APP_BASE_URL }} \
            -Dsurefire.failIfNoSpecifiedTests=false \
            --no-transfer-progress

      - name: Upload UI Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-report
          path: qa-tests/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Summary (runs after all jobs)
  # ─────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Print Summary
        run: |
          echo "## Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (JUnit 5) | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests (REST Assured) | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests (Selenium) | ${{ needs.ui-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ env.APP_BASE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
